<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Outlet Profiler</title>
<link rel="stylesheet" href="/static/floodlight.css"/>
<style>
/* professional type for a CPG sales/KAM persona — swap Floodlight's Anton display for a clean grotesk */
:root{--font-display:"Hanken Grotesk",system-ui,sans-serif;--glow-1:rgba(230,240,255,.05);--glow-2:rgba(255,197,49,.05);--glow-3:rgba(255,59,59,.04);--grain-opacity:.02}
html.light{--glow-1:rgba(70,130,210,.05);--glow-2:rgba(245,176,40,.06);--glow-3:rgba(255,80,80,.03)}
body{font-size:15px}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px}
header{position:sticky;top:0;z-index:30;background:var(--bar);backdrop-filter:blur(10px);border-bottom:1px solid rgb(var(--fg)/.08)}
.hd{display:flex;align-items:center;gap:16px;padding:11px 0 0}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;flex:none}
.brand .logo{font-family:var(--font-display);color:var(--cherry-ink);letter-spacing:-.01em;font-size:21px;font-weight:800}
.brand small{color:rgb(var(--fg)/.5);font-weight:600}
.hdspace{flex:1}
nav.tabs{display:flex;gap:2px;flex-wrap:wrap;padding:6px 0 10px}
nav.tabs button{background:transparent;border:0;color:rgb(var(--fg)/.55);padding:8px 11px;border-radius:9px;cursor:pointer;font:inherit;font-weight:600;font-size:13.5px}
nav.tabs button:hover{color:rgb(var(--fg));background:rgb(var(--fg)/.05)}
nav.tabs button.on{color:rgb(var(--fg));background:rgb(var(--fg)/.09)}
.cosel{display:flex;align-items:center;gap:8px;flex:none;padding-left:10px;border-left:1px solid rgb(var(--fg)/.1)}
.cosel .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:rgb(var(--fg)/.4);font-weight:700}
#gco{min-height:38px;padding:7px 11px;font-weight:700;max-width:210px}
main{padding:34px 0 110px}
h1.hero{font-family:var(--font-display);font-weight:800;font-size:31px;letter-spacing:-.02em;margin:0 0 10px;line-height:1.12}
h2.sec{font-family:var(--font-display);font-weight:800;font-size:23px;letter-spacing:-.01em;margin:0 0 8px}
.lead{color:rgb(var(--fg)/.6);font-size:14.5px;max-width:700px;margin:0 0 24px;line-height:1.6}
.kick{font-size:11px;text-transform:uppercase;letter-spacing:.13em;color:rgb(var(--fg)/.42);font-weight:700}
.pad{padding:20px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.between{justify-content:space-between}
.mut{color:rgb(var(--fg)/.55);font-size:13px}
select.field,input.field{min-height:42px;padding:9px 12px}
select.field{width:auto}
textarea.field{resize:vertical;min-height:62px;line-height:1.5}
.tier{display:inline-flex;align-items:center;border-radius:6px;padding:2px 9px;font-size:11px;font-weight:800;letter-spacing:.02em;text-transform:uppercase}
.tier.T1{background:rgba(47,214,122,.16);color:var(--pitch-ink)}.tier.T2{background:rgba(71,194,255,.16);color:var(--sky-ink)}
.tier.T3{background:rgba(255,197,49,.16);color:var(--amber-ink)}.tier.T4{background:rgba(255,59,59,.16);color:var(--cherry-ink)}
.tier.prov{background:rgb(var(--fg)/.08);color:rgb(var(--fg)/.5)}
.grid{display:grid;gap:14px}
.g-cards{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.g-stat{grid-template-columns:repeat(auto-fit,minmax(196px,1fr))}
.tcard{cursor:pointer;transition:.15s;padding:15px}
.tcard:hover{transform:translateY(-2px);border-color:rgba(255,59,59,.4)}
.stat .big{font-family:var(--font-mono);font-size:29px;font-weight:700;letter-spacing:-.02em;margin-top:4px}
.lv{display:flex;justify-content:space-between;font-size:12.5px;color:rgb(var(--fg)/.6);padding:3px 0;border-top:1px solid rgb(var(--fg)/.07)}
.oid{font-family:var(--font-mono);font-size:12px;color:rgb(var(--fg)/.45)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:rgb(var(--fg)/.45);font-weight:700;padding:10px 11px;border-bottom:1px solid rgb(var(--fg)/.1);position:sticky;top:0;background:var(--bar);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 11px;border-bottom:1px solid rgb(var(--fg)/.06)}
tr.clk{cursor:pointer}tr.clk:hover td{background:rgb(var(--fg)/.04)}
.tablewrap{max-height:620px;overflow:auto;border:1px solid rgb(var(--fg)/.08);border-radius:14px}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
input[type=range]{width:100%;accent-color:var(--cherry)}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px 26px;margin:10px 0 4px}
.wrowh{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px;font-weight:700}
.why{font-size:12px;color:rgb(var(--fg)/.45);margin-top:4px;line-height:1.45}
.callout{border-radius:12px;padding:12px 15px;font-size:13.5px;display:flex;gap:10px;border:1px solid;line-height:1.45}
.callout.ok{background:rgba(47,214,122,.08);border-color:rgba(47,214,122,.3);color:var(--pitch-ink)}
.callout.warn{background:rgba(255,197,49,.08);border-color:rgba(255,197,49,.3);color:var(--amber-ink)}
.callout.bad{background:rgba(255,59,59,.08);border-color:rgba(255,59,59,.35);color:var(--cherry-ink)}
.callout.info{background:rgba(71,194,255,.08);border-color:rgba(71,194,255,.3);color:var(--sky-ink)}
.reasonbox{border:1px dashed rgba(255,197,49,.5);background:rgba(255,197,49,.06);border-radius:12px;padding:13px 15px;margin-top:14px}
.stackbar{display:flex;height:14px;border-radius:6px;overflow:hidden;border:1px solid rgb(var(--fg)/.1)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:rgb(var(--fg)/.6);margin-top:8px}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:5px}
.bar{height:9px;border-radius:6px;background:rgb(var(--fg)/.09);overflow:hidden;flex:1}
.bar>i{display:block;height:100%;border-radius:6px}
.barrow{margin-bottom:12px}.barlab{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
.fitrow{display:grid;grid-template-columns:118px 1fr 62px;gap:10px;align-items:center;margin-bottom:9px;font-size:12.5px}
.fitrow .gr{font-family:var(--font-mono);font-weight:700;text-align:right}
.wpills{display:flex;gap:6px;flex-wrap:wrap}
.wpill{font-size:11px;font-family:var(--font-mono);background:rgb(var(--fg)/.05);border:1px solid rgb(var(--fg)/.1);border-radius:6px;padding:2px 7px;color:rgb(var(--fg)/.65)}
.wpill b{color:rgb(var(--fg)/.9)}
.overlay{position:fixed;inset:0;background:rgba(4,6,9,.72);display:none;place-items:center;z-index:60;padding:20px;backdrop-filter:blur(4px)}
.overlay.show{display:grid}
.modal{max-width:600px;width:100%;max-height:88vh;overflow:auto;padding:0}
.modalh{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 22px;border-bottom:1px solid rgb(var(--fg)/.08);position:sticky;top:0;background:var(--surface);z-index:2}
.modalb{padding:20px 22px}
.task{border:1px solid rgb(var(--fg)/.1);border-radius:10px;padding:12px 14px;margin-top:10px;font-size:13.5px;background:rgb(var(--fg)/.03);line-height:1.5}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-top:8px}
.kv div{display:flex;justify-content:space-between;border-bottom:1px solid rgb(var(--fg)/.06);padding:5px 0;font-size:12.5px}
.kv .k{color:rgb(var(--fg)/.45)}
.spin{color:rgb(var(--fg)/.5);padding:34px;text-align:center}
.iconbtn{background:rgb(var(--fg)/.05);border:1px solid rgb(var(--fg)/.12);color:rgb(var(--fg)/.7);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:15px;flex:none}
.chipbtn{border:1px solid rgb(var(--fg)/.14);background:rgb(var(--fg)/.03);color:rgb(var(--fg)/.7);border-radius:999px;padding:8px 15px;font-size:13px;cursor:pointer;font-weight:600}
.chipbtn:hover{color:rgb(var(--fg))}.chipbtn.on{border-color:var(--cherry);background:rgba(255,59,59,.1);color:var(--cherry-ink)}
.formrow{margin-bottom:14px}.formrow label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.link{color:var(--cherry-ink);cursor:pointer;font-weight:600}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;display:none}
.toast.show{display:block}
.backlink{background:none;border:0;color:rgb(var(--fg)/.55);cursor:pointer;font:inherit;font-weight:600;font-size:13.5px;padding:0}
.backlink:hover{color:var(--cherry-ink)}
.runhd{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin:6px 0 18px}
.deltapill{font-family:var(--font-mono);font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgb(var(--fg)/.05);border:1px solid rgb(var(--fg)/.1)}
.deltapill.up{color:var(--pitch-ink)}.deltapill.dn{color:var(--cherry-ink)}
.seg{display:inline-flex;background:rgb(var(--fg)/.06);border:1px solid rgb(var(--fg)/.1);border-radius:999px;padding:3px;flex:none}
.seg button{background:transparent;border:0;color:rgb(var(--fg)/.55);padding:6px 14px;border-radius:999px;cursor:pointer;font:inherit;font-weight:700;font-size:13px}
.seg button.on{background:var(--cherry);color:#fff}
.crumb{font-size:13px;color:rgb(var(--fg)/.5);font-weight:600;margin-bottom:8px}
.crumb b{color:rgb(var(--fg)/.85)}
.panel{border:1px solid rgb(var(--fg)/.1);border-radius:16px;padding:20px;background:rgb(var(--fg)/.02);margin-top:22px}
.tabbar{display:flex;gap:4px;flex-wrap:wrap}
.tabbar button{background:transparent;border:1px solid rgb(var(--fg)/.14);color:rgb(var(--fg)/.6);border-radius:999px;padding:6px 14px;cursor:pointer;font:inherit;font-weight:700;font-size:13px}
.tabbar button.on{background:var(--pitch);border-color:var(--pitch);color:#04240f}
.codeblock{position:relative;background:#0b0f14;border:1px solid rgb(var(--fg)/.12);border-radius:12px;margin-top:14px;overflow:auto;max-height:520px}
html.light .codeblock{background:#0d1117}
.codeblock pre{margin:0;padding:16px 18px;font-family:var(--font-mono);font-size:12.5px;line-height:1.55;color:#c9d6e5;white-space:pre;overflow:auto}
.copybtn{position:absolute;top:10px;right:10px;background:rgb(255 255 255/.08);border:1px solid rgb(255 255 255/.14);color:#c9d6e5;border-radius:8px;padding:5px 11px;font-size:12px;cursor:pointer;z-index:2}
.subtabs{display:flex;gap:6px;margin-top:12px;align-items:center;flex-wrap:wrap}
.subtabs button{background:rgb(var(--fg)/.05);border:1px solid rgb(var(--fg)/.12);color:rgb(var(--fg)/.6);border-radius:8px;padding:5px 12px;cursor:pointer;font:inherit;font-size:12.5px;font-weight:600}
.subtabs button.on{border-color:var(--pitch);color:var(--pitch-ink)}
.subtabs .url{margin-left:auto;font-family:var(--font-mono);font-size:11.5px;color:rgb(var(--fg)/.45)}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.statgrid>div{background:rgb(var(--fg)/.04);border:1px solid rgb(var(--fg)/.09);border-radius:10px;padding:12px 14px}
.statn{font-size:24px;font-weight:800;line-height:1.1}
.statk{font-size:12px;color:rgb(var(--fg)/.55);margin-top:3px}
.imgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:8px}
.imcell{position:relative;display:block;border-radius:8px;overflow:hidden;border:1px solid rgb(var(--fg)/.12);cursor:pointer;aspect-ratio:1;background:rgb(var(--fg)/.05)}
.imcell img{width:100%;height:100%;object-fit:cover;display:block}
.imcell span{position:absolute;left:4px;bottom:4px;font-size:10px;font-family:var(--font-mono);background:rgb(0 0 0/.55);color:#fff;padding:1px 5px;border-radius:5px}
.omimg{position:relative;margin:0 0 14px;border-radius:10px;overflow:hidden;border:1px solid rgb(var(--fg)/.12);max-height:220px}
.omimg img{width:100%;max-height:220px;object-fit:cover;display:block}
.omimg span{position:absolute;left:8px;bottom:8px;font-size:11px;background:rgb(0 0 0/.55);color:#fff;padding:2px 8px;border-radius:6px}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="hd">
    <div class="brand"><span class="logo">Outlet Profiler</span></div>
    <div class="hdspace"></div>
    <div class="seg" id="mode"><button data-m="product" class="on">Product</button><button data-m="agent">Agent</button></div>
    <div class="cosel">
      <span class="lbl">Company</span>
      <select class="field" id="gco"></select>
      <button class="btn btn-ghost" id="addco" style="min-height:38px" title="Onboard a new company">+ Add</button>
    </div>
    <button class="iconbtn" id="theme" title="Theme">◐</button>
  </div>
  <nav class="tabs" id="tabs">
    <button data-s="classify" class="on">Ask</button>
    <button data-s="runs">Runs</button>
    <button data-s="recommender">Recommender</button>
    <button data-s="segments">Segments</button>
    <button data-s="peers">Peer groups</button>
    <button data-s="coldstart">Cold-start</button>
    <button data-s="validation">Validation</button>
    <button data-s="outlets">Outlet lookup</button>
  </nav>
</div></header>
<main class="wrap"><div id="view"></div></main>
<div class="overlay" id="ov"><div class="card modal">
  <div class="modalh"><div id="mh"></div><button class="iconbtn" onclick="closeM()">✕</button></div>
  <div class="modalb" id="mb"></div>
</div></div>
<div class="card toast" id="toast"></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
const api=(p,o)=>fetch('/api'+p,o).then(r=>r.json());
const post=(p,b)=>api(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=(n,d=0)=>n==null?'–':Number(n).toLocaleString('en-IN',{maximumFractionDigits:d});
const pct=n=>n==null?'–':Math.round(n*100)+'%';
const TC={T1:'var(--pitch)',T2:'var(--sky)',T3:'var(--amber)',T4:'var(--cherry)'};
const tpill=t=>`<span class="tier ${t||'prov'}">${t||'cold'}</span>`;
const LEV=[['range','SKUs / bill'],['cadence','ordering rhythm'],['recency','freshness'],['value','basket value']];
const AXLBL={channel:'Channel',format:'Format (shop type)',region:'Region',affluence:'Affluence tier',density:'Catchment density'};
const FITS=[['fit_premium_launch','Premium launch'],['fit_volume_scheme','Volume scheme'],['fit_assortment_expansion','Distribution / breadth'],['fit_retention','Retention'],['fit_reactivation','Reactivation']];
const ALL='__all';
let SUM=null, COMPS=[], REG={};
let ST={company:ALL,sec:'classify',weights:null,proposed:null,reasons:{},run:null,prevTiers:null,text:'',rf:{region:'',tier:'',format:''},regions:[],agentMode:false};
const AG={tab:'API',man:'agent.json'};
const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200)};
const setT=t=>{document.documentElement.classList.toggle('light',t==='light');localStorage.iris_t=t};
setT(localStorage.iris_t||'dark');
$('#theme').onclick=()=>setT(document.documentElement.classList.contains('light')?'dark':'light');

/* company scope helpers */
const CO=()=>ST.company===ALL?null:ST.company;
const coLabel=()=>ST.company===ALL?'all companies (supervisor)':ST.company;
const supervisor=()=>ST.company===ALL;
const regionsFor=()=>ST.company===ALL?[...new Set(COMPS.flatMap(c=>c.regions||[]))].sort():(REG[ST.company]||[]);
const regOpts=(sel)=>`<option value="">All regions</option>`+regionsFor().map(r=>`<option${r===sel?' selected':''}>${esc(r)}</option>`).join('');
const wpills=w=>LEV.map(([k,l])=>`<span class="wpill">${l.split(' ')[0]} <b>${Math.round((w[k]||0)*100)}%</b></span>`).join('');
const wmini=w=>`<span class="wpill" style="white-space:nowrap" title="range · cadence · recency · value">R<b>${Math.round((w.range||0)*100)}</b> C<b>${Math.round((w.cadence||0)*100)}</b> F<b>${Math.round((w.recency||0)*100)}</b> V<b>${Math.round((w.value||0)*100)}</b></span>`;

/* nav */
$('#tabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;show(b.dataset.s)};
$('#addco').onclick=openAddCompany;
function setMode(m){document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x.dataset.m===m))}
$('#mode').onclick=e=>{const b=e.target.closest('button');if(!b)return;setMode(b.dataset.m);
  if(b.dataset.m==='agent'){ST.agentMode=true;renderAgent()} else {ST.agentMode=false;show(ST.sec||'classify')}};
function setTab(s){document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('on',x.dataset.s===s))}
function show(s){ST.sec=s;ST.agentMode=false;setMode('product');setTab(s);location.hash=s;
  ({classify:renderClassify,run:renderRunView,runs:renderRuns,recommender:renderRec,segments:renderSegments,
    peers:renderPeers,coldstart:renderCold,validation:renderVal,outlets:renderOutlets}[s]||renderClassify)()}
function gotab(s){show(s)}

/* global company change */
function buildCoSelect(){
 $('#gco').innerHTML=COMPS.map(c=>`<option value="${esc(c.company)}"${c.company===ST.company?' selected':''}>${esc(c.company)}</option>`).join('')
   +`<option value="${ALL}"${ST.company===ALL?' selected':''}>▸ All companies · supervisor</option>`;
 $('#gco').onchange=()=>{ST.company=$('#gco').value; ST.rf={region:'',tier:'',format:''}; ST.regions=[];
   if(ST.sec==='run'){show('classify')} else {show(ST.sec)}};
}

/* ---------- CLASSIFY ---------- */
const EX=["Launch a new premium SKU","Push volume with a trade scheme","Win back lapsing outlets","Widen distribution where breadth is low","Protect and grow my best outlets"];
function renderClassify(){
 setTab('classify');
 $('#view').innerHTML=`
  <h1 class="hero">What do you want to do with your outlets?</h1>
  <p class="lead">Describe the play in plain words. The grader weights the parameters that matter, checks the weighting is not just re-ranking by size, and returns the outlets to act on — with how to move each one up a tier. It grades <b>${esc(coLabel())}</b> within its segment (<span class="link" onclick="gotab('segments')">${(SUM.peer_axes||[]).map(a=>AXLBL[a]||a).join(' · ')}</span>).</p>
  <div class="card pad">
    <textarea class="field" id="mtext" placeholder="e.g. Launch a new premium SKU in the metro kirana outlets">${esc(ST.text||'')}</textarea>
    <div class="row" style="margin:14px 0">${EX.map(e=>`<span class="chipbtn ex">${e}</span>`).join('')}</div>
    <div class="row" style="margin:0 0 14px;align-items:flex-start">
      <span class="mut" style="padding-top:7px;min-width:58px">Regions</span>
      <div class="row" id="mregions" style="gap:6px;flex:1">
        <span class="chipbtn rc ${!ST.regions.length?'on':''}" data-r="">All regions</span>
        ${regionsFor().map(r=>`<span class="chipbtn rc ${ST.regions.includes(r)?'on':''}" data-r="${esc(r)}">${esc(r)}</span>`).join('')}
      </div>
    </div>
    <div class="row between">
      <span class="mut">Grading <b style="color:rgb(var(--fg)/.8)">${esc(coLabel())}</b> — change the company in the top bar</span>
      <button class="btn btn-primary" id="go">Profile outlets →</button>
    </div>
  </div>`;
 document.querySelectorAll('.ex').forEach(c=>c.onclick=()=>{$('#mtext').value=c.textContent;runMission()});
 document.querySelectorAll('.rc').forEach(c=>c.onclick=()=>{const r=c.dataset.r;
   if(!r){ST.regions=[]} else {const i=ST.regions.indexOf(r);if(i>=0)ST.regions.splice(i,1);else ST.regions.push(r)}
   document.querySelectorAll('.rc').forEach(x=>x.classList.toggle('on',x.dataset.r?ST.regions.includes(x.dataset.r):!ST.regions.length))});
 $('#go').onclick=()=>runMission();
}

async function runMission(weights){
 const text=$('#mtext')?$('#mtext').value.trim():ST.text; if(!text){toast('Describe the play first');return} ST.text=text;
 const rerun=!!weights;
 if(rerun&&ST.run)ST.prevTiers={...(ST.run.tier_distribution||{})};
 $('#view').innerHTML=`<div class="spin">${rerun?'Re-grading every outlet under your new weights…':'Reading the mission, weighting the parameters and grading every outlet…'}</div>`;
 ST.sec='run';setTab('classify');location.hash='run';
 const body={text,company:CO(),limit:120};
 if(ST.regions.length)body.regions=ST.regions;
 if(weights){body.weights=weights;body.adjust_reasons=ST.reasons}
 const r=await post('/mission',body);
 ST.run=r; ST.weights={...r.weights}; ST.proposed={...r.weights}; if(!weights){ST.reasons={};ST.prevTiers=null}
 ST.rf={region:'',tier:'',format:''};
 renderRunView();
 openRunSummary(rerun);
}

/* ---------- RUN VIEW (dedicated) ---------- */
function renderRunView(){
 const r=ST.run; if(!r){show('classify');return}
 ST.sec='run';location.hash='run';document.querySelectorAll('#tabs button').forEach(x=>x.classList.remove('on'));
 if(!ST.weights)ST.weights={...r.weights}; if(!ST.proposed)ST.proposed={...r.weights};
 const g=r.guard, gc=g.safe?(g.size_correlation<0.35?'ok':'warn'):'bad';

async function changeSegMode(co,mode,cur){

 $('#smout').innerHTML=`<div class="spin">Re-segmenting ${esc(co)} on ${lbl}…</div>`;
 const d=await post('/company/segmode',{company:co,mode});
 if(d.async){
   const tick=async()=>{const j=await api('/company/job/'+d.job_id);
     if(j.status==='running'){const p=j.phase==='typing'?` · ${fmt(j.processed||0)}/${fmt(j.total||0)} photos`:'';
       $('#smout').innerHTML=`<div class="callout info"><span>⏳</span><div>${esc(j.message||'working…')}${p}</div></div>`;setTimeout(tick,1000)}
     else if(j.status==='failed'){$('#smout').innerHTML=`<div class="callout bad"><span>⚠</span><div>${esc(j.message||'failed')}</div></div>`}

 }
 if(d.detail){$('#smout').innerHTML=`<div class="callout bad"><span>⚠</span><div>${esc(d.detail)}</div></div>`;return}
 await refreshSeg(co,d);
}

 toast(co+' re-segmented');renderSegments();

}

function renderOutlets(){
 $('#view').innerHTML=`<h2 class="sec">Outlet lookup</h2><p class="lead">Inspect individual outlets for <b>${esc(coLabel())}</b>. Tiers here use the <b>default balanced weighting</b> — to re-tier under a specific play, run it in <span class="link" onclick="gotab('classify')">Ask</span>. Open any outlet for its grade-vector (how good it is for each play).</p>
  <div class="controls">
   <select class="field" id="oreg">${regOpts('')}</select>
   <select class="field" id="otier"><option value="">All tiers</option><option>T1</option><option>T2</option><option>T3</option><option>T4</option></select>
   <select class="field" id="ofmt"><option value="">All formats</option>${(SUM.formats||[]).map(f=>`<option>${esc(f)}</option>`).join('')}</select>
   <select class="field" id="odata"><option value="">Selling + cold-start</option><option value="true">Selling only</option><option value="false">Cold-start only</option></select>
   <span class="mut" id="ocount"></span></div>
  <div id="otbl" class="spin">loading…</div>`;
 [$('#oreg'),$('#otier'),$('#ofmt'),$('#odata')].forEach(x=>x.onchange=load); load();
 async function load(){
  const q=new URLSearchParams({limit:'300'});
  if(CO())q.set('company',CO());if($('#oreg').value)q.set('region',$('#oreg').value);if($('#otier').value)q.set('tier',$('#otier').value);if($('#odata').value)q.set('has_data',$('#odata').value);
  const d=await api('/outlets?'+q);let outs=d.outlets;const fm=$('#ofmt').value;if(fm)outs=outs.filter(o=>o.format===fm);
  $('#ocount').textContent=`${fmt(d.total)} match · showing ${outs.length}`;
  $('#otbl').outerHTML=`<div class="tablewrap" id="otbl"><table><thead><tr><th>Outlet</th>${supervisor()?'<th>Company</th>':''}<th>Region</th><th>Format</th><th>Tier</th><th>RI</th><th>SKU/bill</th><th>Cadence</th><th>Recency</th><th>Returns</th></tr></thead><tbody>
   ${outs.map(o=>`<tr class="clk" onclick='openOutlet(${o.outletid})'><td class="oid">#${o.outletid}</td>${supervisor()?`<td>${esc((o.company_name||'').slice(0,13))}</td>`:''}<td>${esc(o.regionname||'')}</td><td>${esc(o.format)}</td>
    <td>${o.has_data?tpill(o.tier)+(o.confidence==='low'?' <span class="tier prov">thin</span>':''):tpill(null)}</td>
    <td class="num">${o.RI==null?'–':o.RI.toFixed(2)}</td><td class="num">${o.range_intensity==null?'–':o.range_intensity.toFixed(1)}</td>
    <td class="num">${o.cadence==null?'–':o.cadence.toFixed(2)}</td><td class="num">${o.recency==null?'–':fmt(o.recency)}</td>
    <td class="num">${o.return_rate==null?'–':Math.round(o.return_rate*100)+'%'}</td></tr>`).join('')}</tbody></table></div>`;
 }
}

/* ---------- VALIDATION ---------- */
function renderVal(){
 const v=SUM.validation,t=SUM.totals;const ok=v.guard_pass,every=v.guard_pass_every_company,br=v.companies_over_guard||[];
 const levers=v.per_lever_vs_logsize||{},raw=v['raw_count_levers_vs_logsize (the trap)']||{},pc=v.per_company_decorrelation||{};
 const bar=(l,val,c)=>`<div class="barrow"><div class="barlab"><span>${l}</span><span class="num">${val}</span></div><div class="bar"><i style="width:${Math.min(100,Math.abs(val)*100)}%;background:${c}"></i></div></div>`;
 const co=CO();
 const myPc=co?(pc[co]??null):v.decorrelation_RI_vs_logsize;
 const myOk=myPc==null?ok:(myPc<=0.5);
 const myComp=co?(SUM.companies||[]).find(c=>c.company_name===co):null;
 $('#view').innerHTML=`<h2 class="sec">Does it work?</h2><p class="lead">The one test: is the grade secretly just ranking outlets by sales size? 0 = independent (good), 1 = it is the size grade again. Target under 0.50. Showing ${co?`for <b>${esc(co)}</b>`:'across every company (portfolio)'}.</p>
  <div class="grid g-stat">
   <div class="card pad stat"><div class="kick">Is-it-just-size${co?' · '+esc(co):''}</div><div class="big" style="color:${myOk?'var(--pitch-ink)':'var(--cherry-ink)'}">${myPc==null?'–':myPc}</div><div class="mut">${co?(myOk?'clears 0.50':'breaches 0.50 — residual size lean'):(every?'all companies clear 0.50':br.length+' company breaches ('+br.join(', ')+')')}</div></div>
   ${co?'':`<div class="card pad stat"><div class="kick">Identical-sales divergence</div><div class="big">${v.identical_sales_divergence_pct}%</div><div class="mut">near-equal-sales → different tiers (>25% good)</div></div>`}
   <div class="card pad stat"><div class="kick">Outlets graded</div><div class="big">${fmt(co?(myComp||{}).selling:t.selling)}</div><div class="mut">${co?((myComp||{}).peers+' peers'):(t.companies+' companies · '+t.peers+' peers')}</div></div>
   ${co&&(myComp||{}).tier_distribution?`<div class="card pad stat"><div class="kick">Tier split</div><div class="row" style="margin-top:8px;gap:4px">${['T1','T2','T3','T4'].map(k=>`<span class="tier ${k}">${k} ${fmt((myComp.tier_distribution||{})[k]||0)}</span>`).join('')}</div></div>`:(v.returns&&!co?`<div class="card pad stat"><div class="kick">Returns signal</div><div class="big">${(v.returns.mean_return_rate*100).toFixed(1)}%</div><div class="mut">size-corr ${v.returns.return_rate_vs_logsize} · reported not scored</div></div>`:'')}</div>
  <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:16px">
   <div class="card pad"><div class="kick">Size-neutral levers vs the raw-count trap <span class="mut" style="text-transform:none;letter-spacing:0">· portfolio</span></div><div style="margin-top:12px">
     ${Object.entries(levers).map(([k,val])=>bar('scored · '+k,val,val<.5?'var(--pitch)':'var(--cherry)')).join('')}
     ${Object.entries(raw).map(([k,val])=>bar('trap · '+k.replace('raw_',''),val,'rgb(var(--fg)/.3)')).join('')}</div></div>
   <div class="card pad"><div class="kick">Per-company — the honest cut</div><div style="margin-top:12px">
     ${Object.entries(pc).sort((a,b)=>b[1]-a[1]).map(([c,val])=>bar((c===co?'▸ ':'')+c,val,c===co?'var(--sky)':(val>.5?'var(--cherry)':val>.45?'var(--amber)':'var(--pitch)'))).join('')}</div>
     <div class="mut" style="margin-top:10px">Lever/trap columns are portfolio-wide; the per-company cut shows where a single client's grade still leans on size.</div></div></div>`;
}

/* ---------- AGENT MODE (how to call this agent) ---------- */
const AGENT_DESC="A CPG-OS Case-C depth agent that owns the outlet opportunity-tier truth. It grades every outlet against its structural peer + intensity frontier, sizes the unrealised headroom in ₹, and validates a supervisor's hypotheses about that truth — data-first. Every response is tagged deterministic (a rule over the data) or reasoning (an interpretation call).";
function cb(text){return `<div class="codeblock"><button class="copybtn" onclick="navigator.clipboard.writeText(this.nextElementSibling.textContent);this.textContent='Copied ✓'">Copy</button><pre>${esc(text)}</pre></div>`}
function renderAgent(){
 $('#view').innerHTML=`
  <div class="crumb"><b>Outlet Profiler</b></div>
  <h1 class="hero">Outlet Profiler</h1>
  <p class="lead">${AGENT_DESC}</p>
  <div class="row" style="gap:10px;margin-bottom:4px">
    <button class="btn btn-primary" id="toproduct">Open the product UI →</button>
    <span class="mut">agent_id <b style="color:rgb(var(--fg)/.8)">outlet-profiler</b> · produces observation · diagnosis · opportunity · accepts diagnosis · opportunity</span>
  </div>
  <div class="panel">
   <div class="row between" style="align-items:flex-start">
    <div><div class="kick">How to call this agent</div>
     <div class="mut" style="margin-top:5px">Same agent contract across every surface — the action name <b>grade_outlets</b> is what every caller sends.</div></div>
    <div class="tabbar" id="agtabs">${['API','UI','MCP','CLI','A2A','Manifest'].map(t=>`<button data-t="${t}" class="${t===AG.tab?'on':''}">${t}</button>`).join('')}</div>
   </div>
   <div id="agbody"></div>
  </div>`;
 $('#toproduct').onclick=()=>{setMode('product');ST.agentMode=false;show('classify')};
 $('#agtabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;AG.tab=b.dataset.t;
   document.querySelectorAll('#agtabs button').forEach(x=>x.classList.toggle('on',x===b));drawAgBody()};
 drawAgBody();
}
function drawAgBody(){
 const base=location.origin,b=$('#agbody');
 const note=t=>`<div class="mut" style="margin-top:12px;line-height:1.55">${t}</div>`;
 if(AG.tab==='API'){
  b.innerHTML=cb(
`# grade outlets for a business play → Observations + ₹-sized Opportunities
curl -X POST ${base}/v1/runs \\
  -H "Authorization: Bearer dev-token" \\
  -H "Idempotency-Key: $(uuidgen)" \\
  -H "Content-Type: application/json" \\
  -d '{
    "action": "grade_outlets",
    "agent_specific_payload": {
      "company": "Anchor",
      "mission": "launch a premium SKU in kirana",
      "regions": ["Delhi", "BIHAR"],
      "limit": 20
    }
  }'

# validate a supervisor hypothesis, data-first → a confirm|refute|inconclusive
# Diagnosis, each tagged deterministic|reasoning
curl -X POST ${base}/v1/runs \\

  -H "Content-Type: application/json" \\
  -d '{"action":"validate_opportunity_hypothesis",

         "hypothesis":"my T1 outlets in WEST BENGAL have gone dormant",
         "scope":{"region":"WEST BENGAL"}}}'`)

 }else if(AG.tab==='UI'){
  b.innerHTML=cb("This dashboard is the UI surface of the agent.")

 }else if(AG.tab==='MCP'){

`# list tools
curl -X POST ${base}/mcp -H "Content-Type: application/json" \\

# call a tool (JSON-RPC 2.0) — Idempotency-Key required on runs

   +note('MCP at <b>'+base+'/mcp</b> (JSON-RPC: initialize, tools/list, tools/call). REST convenience: <b>GET /mcp/tools</b>, <b>POST /mcp/tools/{name}</b>.');
 }else if(AG.tab==='CLI'){
  b.innerHTML=cb(
`export PROFILER_API_BASE=${base}
python profiler_cli.py describe
python profiler_cli.py run --action grade_outlets \\

python profiler_cli.py run --action validate_opportunity_hypothesis \\

python profiler_cli.py smoke`)
   +note('The CLI is purely API-backed (<b>--api</b>, <b>--token</b>); no local business logic.');
 }else if(AG.tab==='A2A'){
  b.innerHTML=cb(
`# A2A JSON-RPC — an orchestrator submits a task (message/send)
curl -X POST ${base}/a2a -H "Content-Type: application/json" \\
  -H "Idempotency-Key: $(uuidgen)" \\
  -d '{"jsonrpc":"2.0","id":9,"method":"message/send",
       "params":{"action":"grade_outlets",
         "agent_specific_payload":{"company":"Anchor","mission":"widen distribution"}}}'

# poll the task
curl -X POST ${base}/a2a -H "Content-Type: application/json" \\
  -d '{"jsonrpc":"2.0","id":10,"method":"tasks/get","params":{"id":"<task_id>"}}'`)
   +note('Task states map from run status: submitted / working / completed / failed / canceled. Card at <b>'+base+'/.well-known/agent-card.json</b>.');
 }else if(AG.tab==='Manifest'){
  b.innerHTML=`<div class="subtabs" id="agsub">${['agent.json','agent-card.json','mcp/tools'].map(s=>`<button data-s="${s}" class="${s===AG.man?'on':''}">${s}</button>`).join('')}<span class="url" id="agurl"></span></div><div id="agman"><div class="spin">loading…</div></div>`;
  $('#agsub').onclick=e=>{const x=e.target.closest('button');if(!x)return;AG.man=x.dataset.s;
    document.querySelectorAll('#agsub button').forEach(y=>y.classList.toggle('on',y===x));drawMan()};
  drawMan();
 }
}
async function drawMan(){

     pollOnboard(d.job_id,nm);return;
   }
   $('#aout').innerHTML=`<div class="spin">Ingesting ${chosen.length?chosen.length+' region(s)':'top-3 regions'} — pulling and grading…</div>`;
   const d=await post('/company/add',body);
   $('#ago').disabled=false;
   if(d.detail||d.ok===undefined){$('#aout').innerHTML=`<div class="callout bad"><span>⚠</span><div>${esc(d.detail||'onboarding failed')}</div></div>`;return}
   await afterOnboard(d);
 };
}
let AMODE='text';
// refresh caches, set the onboarded company active, and open its review page
async function afterOnboard(result){
 SUM=await api('/summary');COMPS=(await api('/companies')).companies;REG={};COMPS.forEach(c=>REG[c.company]=c.regions);
 ST.company=result.company;buildCoSelect();toast(result.company+' onboarded — now the active company');
 closeM();renderOnboardReview(result);
}

/* onboarding progress view (photo-classification job) */
const _STEPS=['pulling','typing','grading','done'];
const _STEPLBL={pulling:'looking at outlets',typing:'reading photos',grading:'grading',done:'done'};
async function pollOnboard(jid,name){
 $('#ov').classList.add('show');
 $('#mh').innerHTML=`<div><div style="font-size:16px;font-weight:800">Onboarding ${esc(name)}</div><div class="mut">pull outlets → read photos → grade</div></div>`;
 const draw=j=>{
   const ph=j.phase||'queued',ix=_STEPS.indexOf(ph),pct=j.pct||0;
   const steps=_STEPS.map((s,i)=>`<span style="font-weight:${s===ph?800:600};color:${i<=ix?'rgb(var(--fg)/.9)':'rgb(var(--fg)/.35)'}">${_STEPLBL[s]}</span>`).join('<span class="mut"> → </span>');
   const prog=ph==='typing'?`<div class="bar" style="height:14px;margin-top:14px"><i style="width:${pct}%;background:var(--pitch)"></i></div>
     <div class="mut" style="margin-top:6px">${fmt(j.processed||0)} / ${fmt(j.total||0)} photos${j.eta_s!=null?` · ~${j.eta_s}s remaining`:''}</div>`:'';
   $('#mb').innerHTML=`<div class="row" style="gap:4px;margin-bottom:8px">${steps}</div>
     <div class="callout ${j.status==='failed'?'bad':j.status==='succeeded'?'ok':'info'}"><span>${j.status==='failed'?'⚠':j.status==='succeeded'?'✓':'⏳'}</span><div>${esc(j.message||'working…')}</div></div>
     ${prog}
     ${j.status==='failed'?`<button class="btn btn-ghost" id="onbback" style="width:100%;margin-top:12px">Back</button>`:''}`;
   if(j.status==='failed')$('#onbback').onclick=openAddCompany;
 };
 const tick=async()=>{
   const j=await api('/company/job/'+jid); draw(j);
   if(j.status==='running'){setTimeout(tick,1000)}
   else if(j.status==='succeeded'){await afterOnboard(j.result||{company:name})}
 };
 tick();
}

/* ---------- post-onboard review (what we just pulled) ---------- */
let ST_REVIEW=null;
async function renderOnboardReview(r){
 ST_REVIEW=r; ST.sec='classify'; setTab(null);
 const co=r.company, td=r.tier_distribution||{}, tot=Object.values(td).reduce((a,b)=>a+b,0)||1;
 const modeLbl={text:'text attributes',image:'storefront photos',both:'photos + attributes'}[r.seg_mode]||r.seg_mode;
 const stack=['T1','T2','T3','T4'].map(k=>`<span style="width:${100*(td[k]||0)/tot}%;background:${TC[k]}"></span>`).join('');
 $('#view').innerHTML=`<h2 class="sec">Onboarded ${esc(co)}</h2>
  <p class="lead">Pulled live from the warehouse and graded against structural peers. Segmented on <b>${esc(modeLbl)}</b>.</p>
  <div class="card pad">
   <div class="statgrid">
     <div><div class="statn">${fmt(r.selling_outlets)}</div><div class="statk">selling outlets</div></div>
     <div><div class="statn">${(r.regions||[]).length}</div><div class="statk">region(s)</div></div>
     <div><div class="statn">${fmt(r.peers)}</div><div class="statk">peer groups</div></div>
     <div><div class="statn">${fmt(r.images_typed||0)}</div><div class="statk">photos classified</div></div>
   </div>
   <div class="kick" style="margin-top:16px">Regions pulled</div>
   <div class="row" style="gap:6px;margin-top:8px">${(r.regions||[]).map(x=>`<span class="chipbtn">${esc(x)}</span>`).join('')||'<span class="mut">—</span>'}</div>
   <div class="kick" style="margin-top:16px">Tier split · ${fmt(tot)} outlets</div>
   <div class="stackbar" style="margin-top:8px">${stack}</div>
   <div class="legend">${['T1','T2','T3','T4'].map(k=>`<span><i style="background:${TC[k]}"></i>${k} ${fmt(td[k]||0)}</span>`).join('')}</div>
   <div id="revimgs"></div>
   <div class="row" style="gap:8px;margin-top:18px">
     <button class="btn btn-primary" onclick="gotab('classify')">Profile ${esc(co)} →</button>
     <button class="btn btn-ghost" onclick="gotab('segments')">Segments</button>
     <button class="btn btn-ghost" onclick="gotab('outlets')">Browse outlets</button>
   </div>
  </div>`;
 const ids=(r.sample_outlets||[]);
 const grid=ids.length?ids:((await api('/company/images?company='+encodeURIComponent(co)+'&limit=18')).outlets||[]);
 if(grid.length)$('#revimgs').innerHTML=`<div class="kick" style="margin-top:18px">Outlet photos we pulled</div>
   <div class="imgrid" style="margin-top:8px">${grid.map(id=>`<a class="imcell" onclick="openOutlet(${id})"><img src="/api/outlet/${id}/image" loading="lazy" onerror="this.closest('.imcell').style.display='none'"><span>#${id}</span></a>`).join('')}</div>`;
}

/* ---------- shared outlet lightbox ---------- */
async function openOutlet(id){
 $('#ov').classList.add('show');$('#mb').innerHTML='<div class="spin">loading…</div>';$('#mh').innerHTML='';
 const w=(ST.sec==='run'&&ST.weights)?ST.weights:null;
 const [o,p]=await Promise.all([api('/outlet/'+id),post('/promote',{outletid:id,weights:w||undefined})]);
 const fit=o.action_fit||{};
 $('#mh').innerHTML=`<div><div style="font-size:16px;font-weight:800">Outlet #${o.outletid} ${o.has_data?tpill(o.tier):tpill(null)}</div><div class="mut">${esc(o.company_name)} · ${esc(o.regionname||'')} · ${esc(o.peer)}</div></div>`;
 const bar=(name,real,val)=>real==null?'':`<div class="barrow"><div class="barlab"><span>${name}</span><span class="num">${val} · ${pct(real)}</span></div><div class="bar"><i style="width:${Math.min(100,real*100)}%;background:${real>=.85?'var(--pitch)':real>=.65?'var(--sky)':real>=.45?'var(--amber)':'var(--cherry)'}"></i></div></div>`;
 const grade=q=>q>=.75?'A':q>=.5?'B':q>=.25?'C':'D';
 const gcol=q=>q>=.75?'var(--pitch-ink)':q>=.5?'var(--sky-ink)':q>=.25?'var(--amber-ink)':'var(--cherry-ink)';
 const gbar=q=>q>=.75?'var(--pitch)':q>=.5?'var(--sky)':q>=.25?'var(--amber)':'var(--cherry)';
 const fitrows=o.has_data?FITS.filter(([k])=>fit[k]!=null).map(([k,lbl])=>{const q=fit[k];return `<div class="fitrow"><span>${lbl}</span><div class="bar"><i style="width:${Math.round(q*100)}%;background:${gbar(q)}"></i></div><span class="gr" style="color:${gcol(q)}">${grade(q)} · ${Math.round(q*100)}</span></div>`}).join(''):'';
 const proj=p.projected_tier&&p.current_tier&&p.projected_tier!==p.current_tier;
 $('#mb').innerHTML=`
  <div class="omimg" id="omimg"><img src="/api/outlet/${o.outletid}/image" loading="lazy" onerror="var e=document.getElementById('omimg');if(e)e.style.display='none'"><span>storefront photo</span></div>
  ${o.has_data?`<div class="kick">Grade-vector — how good this outlet is for each play <span class="mut" style="text-transform:none;letter-spacing:0">(percentile vs all outlets)</span></div>
   <div style="margin-top:10px">${fitrows}</div>
   <div class="mut" style="margin-top:2px">Same outlet, a different standing per play — this is why the tier depends on the mission, not a single stored grade.</div>`:''}
  <div class="kick" style="margin-top:18px">Realisation vs peer frontier${w?` — under mission weights (${wpills(w)})`:' (default balanced weighting)'}</div><div style="margin-top:10px">
   ${bar('Basket breadth',o.real_range_intensity,(o.range_intensity??0).toFixed(1)+' SKUs/bill')}
   ${bar('Ordering rhythm',o.real_cadence,(o.cadence??0).toFixed(2))}
   ${bar('Freshness',o.real_recency,fmt(o.recency)+'d')}
   ${bar('Basket value',o.real_value,'INR '+fmt(o.basket_value))}</div>
  <div class="kick" style="margin-top:18px">How to move up a tier</div>
  ${o.has_data?(proj?`<div class="task" style="border-color:rgba(71,194,255,.4)"><b>${p.current_tier} → ${p.projected_tier}</b> · projected realisation ${p.projected_RI}</div>`:'<div class="mut" style="margin-top:8px">Already near the top of its peer — protect it.</div>')+((p.tasks||[]).map(x=>`<div class="task">→ ${esc(x.task)}</div>`).join('')):'<div class="mut" style="margin-top:8px">No sales history — provisional potential only.</div>'}
  <div class="kick" style="margin-top:18px">Primitives</div>
  <div class="kv"><div><span class="k">Bills (3mo)</span><span class="num">${fmt(o.bills)}</span></div><div><span class="k">Distinct SKUs</span><span class="num">${fmt(o.distinct_skus)}</span></div>
   <div><span class="k">Line value INR</span><span class="num">${fmt(o.line_value)}</span></div><div><span class="k">Return rate</span><span class="num">${o.return_rate==null?'–':Math.round(o.return_rate*100)+'%'}</span></div>
   <div><span class="k">Confidence</span><span>${esc(o.confidence)}</span></div><div><span class="k">Legacy grade</span><span>${esc(o.segmentationname||'–')}</span></div></div>`;
}
function closeM(){$('#ov').classList.remove('show')}
$('#ov').onclick=e=>{if(e.target.id==='ov')closeM()};

 SUM=await api('/summary');
 COMPS=(await api('/companies')).companies||[];
 REG={};COMPS.forEach(c=>REG[c.company]=c.regions);
 ST.company=COMPS.length?COMPS[0].company:ALL;
 buildCoSelect();
 const s=(location.hash||'#classify').slice(1);
 show(s==='run'?'classify':s);
})();
</script>
