# Render blueprint — Outlet Profiler as a Docker web service.
# Render injects $PORT and RENDER_EXTERNAL_URL; the manifest self-describes with
# that public URL (agent/identity.py). Deploy: render.com/deploy?repo=<this repo>.
services:
  - type: web
    name: outlet-profiler
    runtime: docker
    plan: starter
    envVars:
      - key: PROFILER_REQUIRE_AUTH
        value: "0"
      - key: PROFILER_WORKERS
        value: "4"
      - key: PROFILER_TRINO_HOSTS
        value: "trino.fieldassist.io,trino-slmg.fieldassist.io,trino-haldiram.fieldassist.io,trino-gulf.fieldassist.io,trino-colpal.fieldassist.io"
      # paste this in the Render dashboard (Environment tab) — enables the LLM lens
      - key: ANTHROPIC_API_KEY
        sync: false
